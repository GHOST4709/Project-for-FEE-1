<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="stylesheet" href="Style1.css">
</head>
<body>
    <div class="glass-container">
        <h2>Hangman</h2>
        <div class="status" id="status">Guesses left: 6</div>
        
        <div class="hangman-drawing">
            <svg height="200" width="200" class="figure-svg">
                <g id="gallows" stroke="#a0aec0" stroke-width="4" stroke-linecap="round" fill="none">
                    <line x1="40" y1="190" x2="160" y2="190" /> <line x1="80" y1="190" x2="80" y2="20" />   <line x1="80" y1="20" x2="140" y2="20" />   <line x1="140" y1="20" x2="140" y2="40" />  </g>
                <g id="figure" stroke="#4facfe" stroke-width="4" stroke-linecap="round" fill="none">
                    <circle id="part-1" cx="140" cy="60" r="20" style="display: none;" /> <line id="part-2" x1="140" y1="80" x2="140" y2="130" style="display: none;" /> <line id="part-3" x1="140" y1="90" x2="110" y2="120" style="display: none;" /> <line id="part-4" x1="140" y1="90" x2="170" y2="120" style="display: none;" /> <line id="part-5" x1="140" y1="130" x2="110" y2="170" style="display: none;" /> <line id="part-6" x1="140" y1="130" x2="170" y2="170" style="display: none;" /> </g>
            </svg>
        </div>

        <div class="word" id="word">_ _ _ _</div>
        <div class="keyboard" id="keyboard"></div>
        <button class="reset-btn" onclick="resetGame()">New Word</button>
    </div>
    <script src="Script1.js"></script>
</body>
</html>
