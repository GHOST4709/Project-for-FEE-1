<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="glass-container">
        <div id="login-form" class="auth-section active">
            <h2>Welcome Back</h2>
            <p class="subtitle">Level up your game.</p>
            
            <form onsubmit="handleLogin(event)">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="auth-btn">Log In</button>
            </form>
            
            <div class="toggle-text">
                Don't have an account? <span onclick="toggleAuth()">Sign up here</span>
            </div>
            <div id="login-error" class="error-msg"></div>
        </div>

        <div id="signup-form" class="auth-section">
            <h2>Create Account</h2>
            <p class="subtitle">Join the Arcade Hub.</p>
            
            <form onsubmit="handleSignup(event)">
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
            
            <div class="toggle-text">
                Already have an account? <span onclick="toggleAuth()">Log in here</span>
            </div>
            <div id="signup-error" class="error-msg"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
