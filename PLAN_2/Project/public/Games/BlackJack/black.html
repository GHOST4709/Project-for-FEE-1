<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub - Blackjack</title>
    <link rel="stylesheet" href="black.css">
</head>
<body>

    <div class="glass-container">
        <header class="bj-header">
            <h2>Blackjack VIP 🃏</h2>
            <div class="bank">Balance: $<span id="balance">1000</span></div>
        </header>

        <div class="game-area">
            <div class="hand-section">
                <h3>🤵 Dealer <span id="dealer-score" class="score"></span></h3>
                <div id="dealer-cards" class="cards-container"></div>
            </div>

            <div class="status-message" id="message">Place your bet to start!</div>

            <div class="hand-section">
                <h3>🎮 Player <span id="player-score" class="score"></span></h3>
                <div id="player-cards" class="cards-container"></div>
            </div>
        </div>

        <div class="controls" id="betting-controls">
            <input type="number" id="bet-amount" value="100" min="10" step="10">
            <button class="action-btn deal-btn" onclick="placeBet()">Place Bet & Deal</button>
        </div>

        <div class="controls hidden" id="action-controls">
            <button class="action-btn hit-btn" onclick="hit()">Hit ☝️</button>
            <button class="action-btn stand-btn" onclick="stand()">Stand ✋</button>
        </div>

        <div class="controls hidden" id="reset-controls">
            <button class="action-btn" onclick="resetRound()">Play Again 🔄</button>
        </div>
    </div>

    <script src="black.js"></script>
</body>
</html>
