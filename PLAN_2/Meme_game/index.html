<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meme Memory Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<video id="bgVideo" autoplay muted loop></video>

<h1>Meme Memory Game 😂</h1>

<div class="controls">

        <option value="6"> Difficult </option>

    ⏱Time: <span id="time">0</span>s | 
    ⭐Score: <span id="score">0</span>
</div>

<div class="game-container" id="gameBoard"></div>
